version: 2

models:
  # -------------------------------------------------------------------
  # production_monthly
  # -------------------------------------------------------------------
  - name: production_monthly
    description: >
      Wide fact table with one row per entity per production month.
      The default table for all production queries. Contains identity,
      descriptive, geographic, time, volume, computed, and lineage columns.
      entity_key resolves mixed grain: wells use api_number, leases use
      TX-LEASE:{district}-{lease_number}.
    columns:
      - name: entity_key
        description: "Unique entity identifier. Wells=api_number, leases=TX-LEASE:{district}-{lease_number}."
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: production_date
        tests:
          - not_null

      - name: reported_month_index
        description: "Sequential count of rows with data per entity (1,2,3...)."
        tests:
          - not_null

      - name: calendar_months_on_production
        description: "Dense month count from first production date, including gaps."
        tests:
          - not_null

      - name: total_oil_bbl
        description: "oil_bbl + condensate_bbl (COALESCE nulls to 0)."

      - name: total_gas_mcf
        description: "gas_mcf + casinghead_gas_mcf (COALESCE nulls to 0)."

      - name: cumulative_oil_bbl
        description: "Running sum of total_oil_bbl per entity."

      - name: cumulative_gas_mcf
        description: "Running sum of total_gas_mcf per entity."

      - name: cumulative_water_bbl
        description: "Running sum of water_bbl per entity."

    tests:
      - unique:
          column_name: "entity_key || '|' || state || '|' || cast(production_date as varchar)"

  # -------------------------------------------------------------------
  # decline_curve_inputs
  # -------------------------------------------------------------------
  - name: decline_curve_inputs
    description: >
      Well-only subset of production data for decline curve analysis (DCA).
      Filtered to entity_type=well with non-zero production. Includes
      months_on_production, initial rates, rate percentages, and cumulatives.
    columns:
      - name: api_number
        description: "API well number."
        tests:
          - not_null

      - name: state
        tests:
          - not_null

      - name: production_date
        tests:
          - not_null

      - name: months_on_production
        description: "1-indexed ordinal month counter from first production month."
        tests:
          - not_null

      - name: initial_oil_rate
        description: "Total oil (BBL) in this well's first producing month."

      - name: initial_gas_rate
        description: "Total gas (MCF) in this well's first producing month."

      - name: oil_rate_pct_of_initial
        description: "Current month oil / initial oil * 100. NULL if initial is 0."

      - name: cumulative_oil
        description: "Running sum of total oil through this month."

      - name: cumulative_gas
        description: "Running sum of total gas through this month."

      - name: cumulative_water
        description: "Running sum of water through this month."

    tests:
      - unique:
          column_name: "api_number || '|' || state || '|' || cast(production_date as varchar)"
